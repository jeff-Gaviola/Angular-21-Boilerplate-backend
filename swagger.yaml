openapi: 3.0.0
info:
  title: Node MySQL API
  version: 1.0.0
servers:
  - url: http://localhost:4000
paths:
  /accounts/register:
    post:
      summary: Register new account
      responses:
        '200':
          description: OK
  /accounts/verify-email:
    post:
      summary: Verify email token
      responses:
        '200':
          description: OK
  /accounts/authenticate:
    post:
      summary: Authenticate account
      responses:
        '200':
          description: OK
  /accounts/refresh-token:
    post:
      summary: Refresh JWT token
      responses:
        '200':
          description: OK
  /accounts/revoke-token:
    post:
      summary: Revoke refresh token
      responses:
        '200':
          description: OK
  /accounts/forgot-password:
    post:
      summary: Request reset token
      responses:
        '200':
          description: OK
  /accounts/validate-reset-token:
    post:
      summary: Validate reset token
      responses:
        '200':
          description: OK
  /accounts/reset-password:
    post:
      summary: Reset account password
      responses:
        '200':
          description: OK
  /accounts:
    get:
      summary: Get all accounts (Admin)
      responses:
        '200':
          description: OK
    post:
      summary: Create account (Admin)
      responses:
        '200':
          description: OK
  /accounts/{id}:
    get:
      summary: Get account by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      summary: Update account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    delete:
      summary: Delete account
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK